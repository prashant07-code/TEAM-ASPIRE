services:
  - type: web
    name: voice-first-grievance-redressal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: STORAGE_ENGINE
        value: file
